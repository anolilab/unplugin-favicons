packages:
    - examples/*

allowBuilds:
    "@parcel/watcher": true
    esbuild: true
    lmdb: true
    msgpackr-extract: true
    nice-napi: true
    oxc-resolver: true
    sharp: true
    svelte-preprocess: true
    unrs-resolver: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
    # Renovate security update: nuxt@4.4.7
    - nuxt@4.4.7
    # Renovate security update: vite@8.0.16
    - vite@8.0.16
    # Renovate security update: astro@6.4.6
    - astro@6.4.6
    # Renovate security update: http-proxy-middleware@3.0.7
    - http-proxy-middleware@3.0.7
    # Renovate security update: @babel/core@7.29.6
    - "@babel/core@7.29.6"
    # Transitive patch resolved before its 24h release-age window; trusted utility, ages out shortly
    - semver@7.8.5

